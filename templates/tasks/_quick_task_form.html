<form class="task-quick-add"
      id="task-quick-form-{{ project.pk }}"
      hx-post="{% url 'tasks:task_create' project.pk %}"
      hx-target="#project-tasks-{{ project.pk }} .task-list"
      hx-swap="beforeend"
      hx-on::after-request="if(event.detail.successful){this.reset();}">
    {% csrf_token %}
    <svg class="quick-add-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path fill="#3d7c2d" d="M10 3h4v7h7v4h-7v7h-4v-7H3v-4h7z"/>
    </svg>
    <input type="text"
           name="name"
           class="form-control{% if form.name.errors %} is-invalid{% endif %}"
           placeholder="Start typing here to create a task..."
           maxlength="200"
           required
           autocomplete="off">
    <button type="submit" class="btn btn-success">Add Task</button>
</form>
{% if form.name.errors %}
    <div class="text-danger small mt-1">{{ form.name.errors|join:", " }}</div>
{% endif %}

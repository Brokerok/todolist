<div x-data="{ open: false }" class="d-inline-block">
    <button type="button"
            class="btn add-list-button"
            x-show="!open"
            x-on:click="open = true; $nextTick(() => $refs.input.focus())">
        <svg class="add-list-plus" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M10 3h4v7h7v4h-7v7h-4v-7H3v-4h7z"/>
        </svg>
        Add TODO List
    </button>

    <form id="project-create-form"
          x-cloak
          :class="open ? 'd-flex' : 'd-none'"
          hx-post="{% url 'tasks:project_create' %}"
          hx-target="#projects-container"
          hx-swap="beforeend"
          hx-on::after-request="
              if (event.detail.successful) {
                  this.reset();
                  document.getElementById('empty-state')?.remove();
              }"
          class="justify-content-center align-items-start gap-2">
        {% csrf_token %}
        <input type="text"
               name="name"
               x-ref="input"
               class="form-control{% if form.name.errors %} is-invalid{% endif %}"
               placeholder="TODO list name"
               maxlength="200"
               required
               style="max-width: 280px;">
        <button type="submit" class="btn add-list-button">Create</button>
        <button type="button"
                class="btn btn-outline-light"
                x-on:click="open = false">
            Cancel
        </button>
    </form>

    {% if form.name.errors %}
        <div class="text-danger small mt-1">{{ form.name.errors|join:", " }}</div>
    {% endif %}
</div>
